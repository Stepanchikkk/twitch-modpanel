<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор пустых иконок</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0e0e10;
            color: #efeff1;
            padding: 40px;
            text-align: center;
        }
        canvas {
            border: 1px solid #3a3a3d;
            margin: 10px;
            background: #18181b;
        }
        button {
            background: #9146FF;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Пустые иконки 24×24</h1>
    <p>Нажми чтобы скачать все иконки</p>
    <div id="canvases"></div>
    <button onclick="downloadAll()">Скачать все</button>
    
    <script>
        const icons = [
            { name: 'announce', label: 'Анонс' },
            { name: 'chat', label: 'Чат' },
            { name: 'poll', label: 'Опрос' },
            { name: 'prediction', label: 'Прогноз' },
            { name: 'clip', label: 'Клип' },
            { name: 'rewards', label: 'Награды' }
        ];
        
        icons.forEach(icon => {
            const canvas = document.createElement('canvas');
            canvas.width = 24;
            canvas.height = 24;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#18181b';
            ctx.fillRect(0, 0, 24, 24);
            canvas.id = icon.name;
            document.getElementById('canvases').appendChild(canvas);
        });
        
        function downloadAll() {
            icons.forEach((icon, i) => {
                setTimeout(() => {
                    const canvas = document.getElementById(icon.name);
                    const link = document.createElement('a');
                    link.download = `icon-${icon.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }, i * 100);
            });
        }
    </script>
</body>
</html>
