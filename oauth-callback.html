<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch ModPanel - OAuth Callback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e10;
            color: #efeff1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .success { color: #00ff00; }
        .error { color: #ff6b6b; }
        p { font-size: 18px; color: #adadb8; margin-top: 10px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #3a3a3d;
            border-top-color: #9146FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #url-display { 
            word-break: break-all; 
            background: #1f1f23; 
            padding: 10px; 
            border-radius: 4px; 
            margin-top: 20px;
            font-size: 12px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>Обработка...</p>
            <div id="url-display"></div>
        </div>
        <div id="success" style="display: none;">
            <h1 class="success">✅ Успешно!</h1>
            <p>Окно закроется автоматически...</p>
        </div>
        <div id="error" style="display: none;">
            <h1 class="error">❌ Ошибка</h1>
            <p id="error-msg"></p>
            <div id="url-display-error"></div>
        </div>
    </div>

    <script>
        (function() {
            // Показываем текущий URL для отладки
            document.getElementById('url-display').textContent = 'URL: ' + window.location.href;
            
            // Ждём немного чтобы URL обновился
            setTimeout(() => {
                const hash = window.location.hash.substring(1);
                
                if (!hash) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error-msg').textContent = 'Токен не найден в URL';
                    document.getElementById('url-display-error').textContent = 'Hash: ' + hash;
                    return;
                }

                const params = new URLSearchParams(hash);
                const token = params.get('access_token');

                if (!token) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error-msg').textContent = 'access_token не найден';
                    document.getElementById('url-display-error').textContent = 'Hash: ' + hash;
                    return;
                }

                // Отправляем токен главному окну
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'TMOD_OAUTH_SUCCESS',
                        token: token
                    }, '*');
                }

                // Показываем успех
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';

                // Закрываем окно через 2 секунды
                setTimeout(() => {
                    window.close();
                }, 2000);
            }, 1000);
        })();
    </script>
</body>
</html>
