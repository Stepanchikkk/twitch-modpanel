<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            width: 300px;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e10;
            color: #efeff1;
        }
        h1 {
            color: #9146FF;
            font-size: 20px;
            margin: 0 0 10px 0;
            text-align: center;
        }
        .status {
            text-align: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 14px;
        }
        .status.loading {
            background: #1f1f23;
            color: #adadb8;
        }
        .status.success {
            background: #00ff0033;
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        .status.error {
            background: #ff000033;
            color: #ff6b6b;
            border: 1px solid #ff0000;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #9146FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn:hover { background: #772ce8; }
        .btn:disabled { background: #3a3a3d; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #1f1f23;
            border-top-color: #9146FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        p { margin: 10px 0; font-size: 13px; color: #adadb8; }
    </style>
</head>
<body>
    <h1>🛡️ ModPanel</h1>

    <div id="loading" class="status loading">
        <span class="spinner"></span>Проверка...
    </div>

    <div id="notLoggedIn" class="status error hidden">
        Требуется вход
    </div>

    <div id="loggedIn" class="status success hidden">
        ✅ Вы вошли!
    </div>

    <button id="loginBtn" class="btn hidden">🔐 Войти через Twitch</button>
    <button id="logoutBtn" class="btn hidden" style="background: #3a3a3d;">🚪 Выйти</button>

    <p id="userInfo" class="hidden" style="text-align: center; color: #adadb8;"></p>

    <script src="popup.js" type="module"></script>
</body>
</html>
