<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://github.com/Stepanchikkk/twitch-modpanel">
    <title>Twitch ModPanel - OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e10;
            color: #efeff1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #9146FF; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3a3a3d;
            border-top-color: #9146FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #adadb8;
        }
    </style>
</head>
<body>
    <h1>🛡️ Twitch ModPanel</h1>
    <div class="spinner"></div>
    <div class="status">Обработка авторизации...</div>

    <script>
        (function() {
            // Парсим токен из URL hash
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (!token) {
                document.querySelector('.status').textContent = '❌ Ошибка: токен не получен';
                document.querySelector('.status').style.color = '#ff6b6b';
                return;
            }

            // Получаем информацию о пользователе
            fetch('https://api.twitch.tv/helix/users', {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Client-Id': 'qz89rtnd3uz3v7k3rnh5hffx3b97mu'
                }
            })
            .then(response => response.json())
            .then(data => {
                const user = data.data[0];
                if (!user) {
                    throw new Error('No user data');
                }

                // Отправляем токен и пользователя обратно через postMessage
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'TMOD_OAUTH_SUCCESS',
                        token: token,
                        user: {
                            id: user.id,
                            login: user.login,
                            display_name: user.display_name
                        }
                    }, '*');
                }

                // Показываем успех
                document.querySelector('.status').textContent = '✅ Успешно! Окно закроется...';
                document.querySelector('.status').style.color = '#00ff00';

                // Закрываем окно через 1 секунду
                setTimeout(() => {
                    window.close();
                }, 1000);
            })
            .catch(error => {
                console.error('OAuth error:', error);
                document.querySelector('.status').textContent = '❌ Ошибка: ' + error.message;
                document.querySelector('.status').style.color = '#ff6b6b';
            });
        })();
    </script>
</body>
</html>
